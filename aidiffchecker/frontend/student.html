<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: #eff6ff;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #1e3a8a;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: transparent;
            border: none;
            color: #bfdbfe;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar button:hover {
            background: #1d4ed8;
            color: white;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .logout-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #1e40af;
        }

        /* Content */
        .content {
            padding: 30px;
        }

        /* Stats Cards */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #2563eb;
        }

        .stat-card h4 {
            color: #6b7280;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 22px;
            font-weight: bold;
            color: #1e3a8a;
        }

        /* Section card */
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #dbeafe;
        }

        .primary-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .primary-btn:hover {
            background: #1e40af;
        }

        .section {
            display: none;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>🧑‍🎓Student Panel</h2>
        <button onclick="showHome()">🏠 Home</button>
        <button onclick="showSection('upload')">⬆ Upload PDF</button>
        <button onclick="showSection('password')">🔐 Change Password</button>
    </div>

    <div class="main">
        <div class="topbar">
            <h3>Dashboard</h3>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="content">

            <!-- Home Cards -->
            <div id="homeCards" class="stats">

                <div class="stat-card" onclick="showSection('myUploads')" style="cursor:pointer;">
                    <h4>My Uploads</h4>
                    <p id="myUploadCount">0</p>
                </div>

                <div class="stat-card" onclick="showSection('resultPDFs')" style="cursor:pointer;">
                    <h4>Result PDFs</h4>
                    <p id="resultCount">0</p>
                </div>

            </div>

            <!-- View Materials -->
            <div id="materials" class="section card">
                <h3>Available PDFs</h3>
                <p>PDF list will appear here</p>
            </div>

            <!-- Change Password -->
            <div id="password" class="section card">
                <h3>Change Password</h3>
                <input type="password" placeholder="Current Password">
                <input type="password" placeholder="New Password">
                <button class="primary-btn">Update</button>
            </div>
            <!-- Upload PDF -->
            <div id="upload" class="section card">
                <h3>Upload PDF for Comparison</h3>
                <input type="file" id="uploadFile">
                <button class="primary-btn" onclick="uploadPDF()">Upload</button>
            </div>

            <!-- My Uploaded Files -->
            <div id="myUploads" class="section card">
                <h3>My Uploaded Files</h3>
                <p>Uploaded files will appear here</p>
                <ul id="uploadedList"></ul>
            </div>

            <!-- Result PDFs -->
            <div id="resultPDFs" class="section card">
                <h3>Comparison Results</h3>
                <p>Result PDFs will appear here</p>
                <ul id="resultList"></ul>
            </div>

        </div>
    </div>

    <script>
        const username = localStorage.getItem("username");
        function showSection(id) {
            document.getElementById("homeCards").style.display = "none";

            document.querySelectorAll(".section").forEach(s => {
                s.style.display = "none";
            });

            document.getElementById(id).style.display = "block";
        }

        function showHome() {
            document.querySelectorAll(".section").forEach(s => {
                s.style.display = "none";
            });

            document.getElementById("homeCards").style.display = "flex";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }
        
        async function loadStudentUploads(){
            const res = await fetch(`http://127.0.0.1:8000/student/uploads/${username}`);
            const data = await res.json();
            document.getElementById("myUploadCount").innerText = data.files.length;
            const list = document.getElementById("uploadedList");
            list.innerHTML = "";
            data.files.forEach(f=>{
                const li=document.createElement("li");
                li.innerText = f;
                list.appendChild(li);
            });
        }

        async function loadResultPDFs(){
            const res = await fetch(`http://127.0.0.1:8000/student/result_pdfs/${username}`);
            const data = await res.json();
            document.getElementById("resultCount").innerText = data.files.length;
            const list = document.getElementById("resultList");
            list.innerHTML = "";
            data.files.forEach(f=>{
                const li=document.createElement("li");
                li.innerText = f;
                list.appendChild(li);
            });
        }

        async function uploadPDF(){
            const fileInput = document.getElementById("uploadFile");
            if(!fileInput.files.length) return alert("Select a file!");
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("username", username);

            const res = await fetch("http://127.0.0.1:8000/upload_student_pdf",{
                method:"POST",
                body:formData
            });
            const data = await res.json();
            alert(data.message);

            loadStudentUploads();
        }

        loadStudentUploads();
        loadResultPDFs();
    </script>

</body>

</html>

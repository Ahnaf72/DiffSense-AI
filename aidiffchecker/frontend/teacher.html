<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            background: #f0fdf4;
            height: 100vh;
        }


        .sidebar {
            width: 240px;
            background: #065f46;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            /* same as student */
            margin-bottom: 10px;
            /* spacing between buttons */
            background: transparent;
            border: none;
            color: #a7f3d0;
            /* teacher color */
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            /* rounded corners */
            transition: 0.3s;
            /* smooth hover effect */
            font-size: 15px;
            /* same as student */
            
        }

        .sidebar button:hover {
            background: #047857;
            /* dark green hover */
            color: white;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .logout-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .content {
            padding: 30px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #10b981;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        .primary-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
        }

        .section {
            display: none;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2> 🧑‍🏫Teacher Panel</h2>
        <button onclick="showHome()">🏠 Home</button>
        <button onclick="showSection('upload')">📄 Upload PDFs</button>
        <button onclick="showSection('password')">🔐 Change Password</button>
    </div>

    <div class="main">
        <div class="topbar">
            <h3>Dashboard</h3>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="content">

            <!-- Home Cards -->
            <div id="homeCards" class="stats">

                <div class="stat-card" onclick="showSection('myUploads')" style="cursor:pointer;">
                    <h4>My Uploaded Files</h4>
                    <p id="uploadCount">0</p>
                </div>

                <div class="stat-card" onclick="showSection('resultPDFs')" style="cursor:pointer;">
                    <h4>Result PDFs</h4>
                    <p id="resultCount">0</p>
                </div>

            </div>

            <div id="upload" class="section card">
                <h3>Upload Multiple PDFs</h3>
                <input type="file" multiple>
                <button class="primary-btn" onclick="uploadTeacherPDF()">Upload</button>
            </div>

            <div id="password" class="section card">
                <h3>Change Password</h3>
                <input type="password" placeholder="Current Password">
                <input type="password" placeholder="New Password">
                <button class="primary-btn">Update</button>
            </div>
            <!-- My Uploaded Files -->
            <div id="myUploads" class="section card">
                <h3>Uploaded Files</h3>
                <p>Teacher uploaded files will appear here</p>
            </div>

            <!-- Result PDFs -->
            <div id="resultPDFs" class="section card">
                <h3>Comparison Result PDFs</h3>
                <p>Result PDFs will appear here</p>
            </div>

        </div>
    </div>

    <script>
        const username = localStorage.getItem("username");
        function showSection(id) {
            document.getElementById("homeCards").style.display = "none";

            document.querySelectorAll(".section").forEach(s => {
                s.style.display = "none";
            });

            document.getElementById(id).style.display = "block";
        }

        function showHome() {
            document.querySelectorAll(".section").forEach(s => {
                s.style.display = "none";
            });

            document.getElementById("homeCards").style.display = "flex";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }
        
    </script>

</body>

</html>

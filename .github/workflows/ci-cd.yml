name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint & Basic Checks ──────────────────────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 pyflakes

      - name: Check Python syntax (backend)
        run: |
          pyflakes backend/ 2>&1 || true
          flake8 backend/ --max-line-length=120 --exclude=__pycache__,.venv --count --show-source --statistics || true

  # ── Build Docker Image ───────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: diffsense-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker container starts
        run: |
          docker run -d --name test-container \
            -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            -e SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
            -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
            -e PORT=8000 \
            -p 8000:8000 \
            diffsense-ai:latest
          sleep 15
          curl -f http://localhost:8000/api/system/health || (docker logs test-container && exit 1)
          docker stop test-container

  # ── Deploy handled by Railway GitHub integration ─────────────────────────
  # Railway auto-deploys on push to main when connected to the GitHub repo.
  # Configure at: Railway Dashboard → Project → Settings → Source
